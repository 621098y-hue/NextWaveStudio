<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>면적 변환기 | 평수 제곱미터 계산</title>
    
    <!-- 폰트 설정 (프리텐다드) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="noise-overlay"></div>

    <div class="container">
        <header>
            <h1>단위 변환기<span class="accent-text">.</span></h1>
            <p class="subtitle">평수와 제곱미터를 실시간으로 변환하세요</p>
        </header>

        <main>
            <div class="converter-card">
                <!-- Pyeong Input Section -->
                <div class="input-section">
                    <div class="input-label">
                        <span>평수 (Pyeong)</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="pyeong-input" placeholder="0" step="any" inputmode="decimal">
                        <span class="unit-badge">평</span>
                    </div>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-type="pyeong" data-value="18">18평</button>
                        <button class="quick-btn" data-type="pyeong" data-value="24">24평</button>
                        <button class="quick-btn" data-type="pyeong" data-value="32">32평</button>
                        <button class="quick-btn" data-type="pyeong" data-value="45">45평</button>
                    </div>
                </div>

                <div class="divider">⇄</div>

                <!-- Square Meter Input Section -->
                <div class="input-section">
                    <div class="input-label">
                        <span>제곱미터 (㎡)</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="m2-input" placeholder="0" step="any" inputmode="decimal">
                        <span class="unit-badge">㎡</span>
                    </div>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-type="m2" data-value="59">59㎡</button>
                        <button class="quick-btn" data-type="m2" data-value="84">84㎡</button>
                        <button class="quick-btn" data-type="m2" data-value="114">114㎡</button>
                        <button class="quick-btn" data-type="m2" data-value="135">135㎡</button>
                    </div>
                </div>

                <!-- Info Panel -->
                <div class="info-panel">
                    <h3>💡 알아두면 좋은 상식</h3>
                    <ul class="info-list">
                        <li>1평은 약 <strong>3.3058㎡</strong>입니다.</li>
                        <li>84㎡는 전용면적 기준이며, 흔히 <strong>32~34평형</strong>으로 불립니다.</li>
                        <li>공급면적은 전용면적에 주거공용면적을 더한 넓이입니다.</li>
                    </ul>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 AreaConverter. 정확한 면적 계산을 위한 스마트 도구.</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
