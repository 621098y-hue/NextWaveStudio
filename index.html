<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <style>
        /* 폰트 설정 (프리텐다드) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            /* Dark Mode (Default) - Dreamy Purple Palette */
            --bg-color: #0f0c29; 
            --container-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #e6edf3;
            --accent-color: #bb86fc; 
            --btn-bg: linear-gradient(135deg, #a29bfe, #6c5ce7);
            --btn-hover-bg: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --ball-shadow: rgba(0, 0, 0, 0.4);
            --box-inner-bg: rgba(0, 0, 0, 0.2);
            
            /* 로또 공 색상 */
            --ball-1: linear-gradient(135deg, #fbc400, #ff9f43);
            --ball-11: linear-gradient(135deg, #69c8f2, #2d98da);
            --ball-21: linear-gradient(135deg, #ff7285, #eb3b5a);
            --ball-31: linear-gradient(135deg, #b0d840, #26de81);
            --ball-41: linear-gradient(135deg, #f39c12, #e67e22);
        }

        body.light-mode {
            /* Light Mode Overrides */
            --bg-color: #f8f7ff;
            --container-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(108, 92, 231, 0.1);
            --text-color: #2d3436;
            --accent-color: #6c5ce7;
            --shadow-color: rgba(108, 92, 231, 0.15);
            --ball-shadow: rgba(0, 0, 0, 0.15);
            --box-inner-bg: rgba(108, 92, 231, 0.05);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 배경 애니메이션 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--accent-color);
            filter: blur(100px);
            z-index: -1;
            opacity: 0.2;
            animation: moveLight 20s infinite alternate ease-in-out;
        }

        @keyframes moveLight {
            0% { transform: translate(-200px, -200px); }
            100% { transform: translate(200px, 200px); }
        }

        .container {
            text-align: center;
            background: var(--container-bg);
            padding: 3rem 2rem;
            border-radius: 32px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px var(--shadow-color);
            max-width: 95%;
            width: 520px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 2rem;
            text-shadow: 0 2px 10px rgba(108, 92, 231, 0.3);
        }

        /* 번호가 나오는 박스 디자인 */
        .number-container {
            display: flex;
            gap: 12px;
            margin: 1.5rem 0 2.5rem 0;
            justify-content: center;
            align-items: center;
            min-height: 110px;
            flex-wrap: wrap;
            background: var(--box-inner-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 2px dashed var(--border-color);
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        /* 로또 공 디자인 */
        .number-ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 12px var(--ball-shadow);
            opacity: 0;
            transform: scale(0);
            animation: appearBall 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .number-ball:hover { transform: scale(1.15) rotate(5deg); }

        .bonus-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .bonus-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.7s;
        }

        .plus-sign {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            opacity: 0;
            margin: 0 5px;
            animation: fadeIn 0.5s forwards 0.6s;
        }

        /* 번호 출현 애니메이션 */
        @keyframes appearBall {
            0% { 
                opacity: 0; 
                transform: scale(0) translateY(30px) rotate(-45deg);
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0) rotate(0);
                filter: blur(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 0.5; }
        }

        .ball-1 { background: var(--ball-1); }
        .ball-11 { background: var(--ball-11); }
        .ball-21 { background: var(--ball-21); }
        .ball-31 { background: var(--ball-31); }
        .ball-41 { background: var(--ball-41); }

        button {
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.3);
        }

        button:hover {
            background: var(--btn-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* 테마 토글 버튼 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px var(--shadow-color);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

<button class="theme-toggle" id="themeBtn" title="테마 변경">🌙</button>

<div class="container">
    <img src="dog.PNG" alt="김콩이" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 1rem; box-shadow: 0 8px 25px var(--shadow-color); object-fit: cover; display: block; margin-left: auto; margin-right: auto; position: relative; z-index: 10;">
    <h1>✨ 콩이 로또 추천</h1>
    
    <!-- 번호 박스 영역 -->
    <div class="number-container" id="ballBox">
        <span style="opacity: 0.3; font-size: 0.9rem;">버튼을 눌러 번호를 생성하세요!</span>
    </div>

    <button onclick="generateLotto()">새로운 번호 픽!</button>
    <div id="datetime" style="margin-top: 1.5rem; font-size: 0.85rem; opacity: 0.6; color: var(--text-color);"></div>
</div>

<script>
    // 테마 토글 로직
    const themeBtn = document.getElementById('themeBtn');
    const body = document.body;

    if (localStorage.getItem('theme') === 'light') {
        body.classList.add('light-mode');
        themeBtn.innerText = '☀️';
    }

    themeBtn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        const isLight = body.classList.contains('light-mode');
        themeBtn.innerText = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    function updateDateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false,
            timeZone: 'Asia/Seoul'
        };
        document.getElementById('datetime').innerText = now.toLocaleString('ko-KR', options);
    }

    function createBall(num, delay) {
        const ball = document.createElement('div');
        ball.classList.add('number-ball');
        ball.innerText = num;
        ball.style.animationDelay = `${delay}s`;

        if (num <= 10) ball.classList.add('ball-1');
        else if (num <= 20) ball.classList.add('ball-11');
        else if (num <= 30) ball.classList.add('ball-21');
        else if (num <= 40) ball.classList.add('ball-31');
        else ball.classList.add('ball-41');

        return ball;
    }

    function generateLotto() {
        updateDateTime();
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = ''; 

        let allNumbers = [];
        while(allNumbers.length < 7) {
            let num = Math.floor(Math.random() * 45) + 1;
            if(!allNumbers.includes(num)) {
                allNumbers.push(num);
            }
        }

        const mainNumbers = allNumbers.slice(0, 6).sort((a, b) => a - b);
        const bonusNumber = allNumbers[6];

        mainNumbers.forEach((num, index) => {
            ballBox.appendChild(createBall(num, index * 0.1));
        });

        const plusSign = document.createElement('div');
        plusSign.className = 'plus-sign';
        plusSign.innerText = '+';
        ballBox.appendChild(plusSign);

        const bonusWrapper = document.createElement('div');
        bonusWrapper.className = 'bonus-wrapper';
        
        const label = document.createElement('span');
        label.className = 'bonus-label';
        label.innerText = 'BONUS';
        
        bonusWrapper.appendChild(label);
        bonusWrapper.appendChild(createBall(bonusNumber, 0.7));
        
        ballBox.appendChild(bonusWrapper);
    }
</script>

</body>
</html>
