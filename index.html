<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염건호 팀장 | 점포 전문컨설팅 프로필</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">전문컨설팅</div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="profile-card">
            <!-- 왼쪽: 프로필 요약 -->
            <div class="card-left">
                <div class="profile-img-wrapper">
                    <img src="https://success.jumpoline.com/FileData/Consultant/g621098/chain_202512041459198622.png" alt="염건호 팀장">
                </div>
                <div class="identity">
                    <h1>염건호 <span class="title">팀장</span></h1>
                    <p class="experience">10년 이상 점포 컨설팅 전문</p>
                </div>
                <div class="cta-group">
                    <a href="https://www.jumpoline.com/agent/agent_view.aspx?cstid=g621098&menu=&pop=1" target="_blank" class="primary-btn">상담 예약하기</a>
                    <a href="tel:010-8164-1345" class="secondary-btn"><i class="fas fa-phone"></i> 전화상담</a>
                </div>
            </div>

            <!-- 오른쪽: 상세 정보 -->
            <div class="card-right">
                <div class="info-section highlight-section">
                    <h3><i class="fas fa-briefcase"></i> 전문 분야</h3>
                    <div class="tag-group">
                        <span class="tag">점포 컨설팅</span>
                        <span class="tag">권리금 산정</span>
                        <span class="tag">상권 분석</span>
                        <span class="tag">프랜차이즈</span>
                    </div>
                    <p class="description">빅데이터 기반의 정밀 분석으로 성공 창업의 길을 열어드립니다. 소중한 자산의 가치를 정확히 평가하고 신속한 양도양수를 지원합니다.</p>
                </div>

                <div class="info-section consultation-guide">
                    <h3><i class="fas fa-address-book"></i> 상담 안내</h3>
                    <div class="consultation-info">
                        <a href="tel:010-8164-1345" class="phone-number">010-8164-1345</a>
                        <ul class="contact-list">
                            <li><i class="fas fa-envelope icon-accent"></i> <a href="mailto:y621098@naver.com" class="contact-link">y621098@naver.com</a></li>
                            <li><i class="fas fa-map-marker-alt icon-accent"></i> <span class="contact-text">서울 서초구 강남대로 617 점포라인</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 염건호 팀장. All Rights Reserved. 본 페이지는 컨설팅 안내용입니다.</p>
    </footer>

    <script src="main.js"></script>

</html>
