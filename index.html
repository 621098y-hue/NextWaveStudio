<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <style>
        /* 폰트 설정 (프리텐다드) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-color: #0d1117;
            --container-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #e6edf3;
            --accent-color: #79c0ff;
            --btn-bg: linear-gradient(135deg, #1d9bf0, #007aff);
            --btn-hover-bg: linear-gradient(135deg, #007aff, #1d9bf0);
            --shadow-color: rgba(0, 0, 0, 0.5);
            
            /* 로또 공 색상 (현대적인 그라데이션) */
            --ball-1: linear-gradient(135deg, #fbc400, #ff9f43);
            --ball-11: linear-gradient(135deg, #69c8f2, #2d98da);
            --ball-21: linear-gradient(135deg, #ff7285, #eb3b5a);
            --ball-31: linear-gradient(135deg, #b0d840, #26de81);
            --ball-41: linear-gradient(135deg, #f39c12, #e67e22);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* 배경 애니메이션용 */
        }

        /* 배경 애니메이션 (움직이는 빛) */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(121, 192, 255, 0.2);
            filter: blur(80px);
            z-index: -1;
            animation: moveLight 15s infinite alternate ease-in-out;
        }

        @keyframes moveLight {
            0% { transform: translate(-150px, -150px); }
            100% { transform: translate(150px, 150px); }
        }

        .container {
            text-align: center;
            background: var(--container-bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px); /* 유리 효과 */
            box-shadow: 0 15px 35px var(--shadow-color);
            max-width: 95%;
            width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .number-container {
            display: flex;
            gap: 10px;
            margin-bottom: 2.5rem;
            justify-content: center;
            align-items: center;
            min-height: 56px;
            flex-wrap: wrap;
        }

        /* 로또 공 디자인 */
        .number-ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.5);
            animation: appearBall 0.5s forwards ease-out;
        }

        .number-ball:hover { transform: scale(1.15) rotate(5deg); }

        /* 보너스 공 텍스트 라벨 */
        .bonus-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .bonus-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plus-sign {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            opacity: 0.5;
            margin: 0 5px;
        }

        /* 공이 나타나는 애니메이션 */
        @keyframes appearBall {
            to { opacity: 1; transform: scale(1); }
        }

        /* 로또 공 색상 범위 */
        .ball-1 { background: var(--ball-1); }
        .ball-11 { background: var(--ball-11); }
        .ball-21 { background: var(--ball-21); }
        .ball-31 { background: var(--ball-31); }
        .ball-41 { background: var(--ball-41); }

        button {
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        button:hover {
            background: var(--btn-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(0, 123, 255, 0.5);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0, 123, 255, 0.3);
        }

        /* 댓글 섹션 스타일 */
        .comments-container {
            width: 95%;
            max-width: 500px;
            margin: 2rem auto;
            background: var(--container-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px var(--shadow-color);
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="dog.PNG" alt="김콩이" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 1rem; box-shadow: 0 8px 25px var(--shadow-color); object-fit: cover; display: block; margin-left: auto; margin-right: auto; position: relative; z-index: 10;">
    <h1>✨ 김콩이 로또 추천</h1>
    <div class="number-container" id="ballBox">
        <!-- 번호가 여기에 생성됨 -->
    </div>
    <button onclick="generateLotto()">새로운 번호 픽!</button>
    <div id="datetime" style="margin-top: 1.5rem; font-size: 0.85rem; opacity: 0.6; color: var(--text-color);"></div>
</div>

<!-- Disqus 댓글 섹션 -->
<div class="comments-container">
    <div id="disqus_thread"></div>
</div>

<script>
    function updateDateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false,
            timeZone: 'Asia/Seoul'
        };
        document.getElementById('datetime').innerText = now.toLocaleString('ko-KR', options);
    }

    function createBall(num, delay) {
        const ball = document.createElement('div');
        ball.classList.add('number-ball');
        ball.innerText = num;
        ball.style.animationDelay = `${delay}s`;

        if (num <= 10) ball.classList.add('ball-1');
        else if (num <= 20) ball.classList.add('ball-11');
        else if (num <= 30) ball.classList.add('ball-21');
        else if (num <= 40) ball.classList.add('ball-31');
        else ball.classList.add('ball-41');

        return ball;
    }

    function generateLotto() {
        updateDateTime();
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = ''; // 기존 번호 삭제

        let allNumbers = [];
        while(allNumbers.length < 7) {
            let num = Math.floor(Math.random() * 45) + 1;
            if(!allNumbers.includes(num)) {
                allNumbers.push(num);
            }
        }

        // 처음 6개는 정규 번호, 마지막 1개는 보너스 번호
        const mainNumbers = allNumbers.slice(0, 6).sort((a, b) => a - b);
        const bonusNumber = allNumbers[6];

        // 정규 번호 생성
        mainNumbers.forEach((num, index) => {
            ballBox.appendChild(createBall(num, index * 0.1));
        });

        // + 기호 추가
        const plusSign = document.createElement('div');
        plusSign.className = 'plus-sign';
        plusSign.innerText = '+';
        plusSign.style.opacity = '0';
        plusSign.style.animation = 'appearBall 0.5s forwards ease-out';
        plusSign.style.animationDelay = '0.6s';
        ballBox.appendChild(plusSign);

        // 보너스 번호 추가 (라벨 포함)
        const bonusWrapper = document.createElement('div');
        bonusWrapper.className = 'bonus-wrapper';
        
        const label = document.createElement('span');
        label.className = 'bonus-label';
        label.innerText = 'BONUS';
        label.style.opacity = '0';
        label.style.animation = 'appearBall 0.5s forwards ease-out';
        label.style.animationDelay = '0.7s';
        
        bonusWrapper.appendChild(label);
        bonusWrapper.appendChild(createBall(bonusNumber, 0.7));
        
        ballBox.appendChild(bonusWrapper);
    }
</script>

</body>
</html>
